<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New Password — VaultHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --bg:#080810;--bg2:#0e0e1a;--bg3:#13131f;--border:#1e1e32;
            --accent:#6366f1;--accent2:#818cf8;--text:#e8e8f5;--muted:#52526e;
            --red:#f87171;--yellow:#fbbf24;--green:#34d399;
            --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.2rem;}
        .card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.2rem;}
        .icon-wrap{width:52px;height:52px;border-radius:14px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1.2rem;}
        h2{font-size:1.35rem;font-weight:800;color:#fff;margin-bottom:0.35rem;}
        .sub{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.8rem;}
        .field{margin-bottom:1.1rem;}
        .field label{display:block;font-size:0.76rem;font-weight:600;color:var(--text);margin-bottom:0.38rem;}
        .pw-wrap{position:relative;display:flex;align-items:center;}
        .pw-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0.68rem 2.6rem 0.68rem 0.9rem;font-size:0.87rem;font-family:var(--font);color:var(--text);outline:none;transition:all .2s;}
        .pw-wrap input::placeholder{color:#32324a;}
        .pw-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
        .pw-wrap input.mismatch{border-color:var(--red);}
        .eye-btn{position:absolute;right:0.75rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:1rem;display:flex;align-items:center;justify-content:center;}
        .strength-bar{height:3px;border-radius:4px;margin-top:6px;transition:all .3s;background:var(--border);}
        .strength-label{font-size:0.68rem;font-family:var(--mono);margin-top:4px;}
        .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:0.72rem;font-size:0.9rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;box-shadow:0 2px 14px rgba(99,102,241,0.3);display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:0.3rem;}
        .btn-primary:hover{background:#5254cc;transform:translateY(-1px);}
        .alert-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:#fca5a5;border-radius:8px;padding:0.7rem 0.9rem;font-size:0.81rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;}
        .step-bar{display:flex;gap:6px;margin-bottom:1.6rem;}
        .step{height:3px;flex:1;border-radius:4px;background:var(--border);}
        .step.active{background:var(--accent);}
    </style>
</head>
<body>
<div class="card">
    <div class="step-bar">
        <div class="step active"></div>
        <div class="step active"></div>
        <div class="step active"></div>
    </div>
    <div class="icon-wrap">🔑</div>
    <h2>Set new password</h2>
    <p class="sub">Choose a strong password for your VaultHub account.</p>

    <div class="alert-err" th:if="${error}">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}">Error</span>
    </div>

    <form th:action="@{/forgot-password/reset}" method="post" id="resetForm">
        <div class="field">
            <label>New Password</label>
            <div class="pw-wrap">
                <input type="password" name="password" id="password"
                       placeholder="Min. 6 characters" required autocomplete="new-password"/>
                <button type="button" class="eye-btn" onclick="togglePw('password', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="strength-bar" id="strengthBar"></div>
            <div class="strength-label" id="strengthLabel" style="color:var(--muted)"></div>
        </div>
        <div class="field">
            <label>Confirm New Password</label>
            <div class="pw-wrap">
                <input type="password" name="confirmPassword" id="confirmPassword"
                       placeholder="Repeat your password" required autocomplete="new-password"/>
                <button type="button" class="eye-btn" onclick="togglePw('confirmPassword', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-primary">
            <i class="bi bi-check2-circle"></i> Reset Password
        </button>
    </form>
</div>

<script>
    function togglePw(id, btn) {
        const inp = document.getElementById(id);
        const isHidden = inp.type === 'password';
        inp.type = isHidden ? 'text' : 'password';
        btn.innerHTML = isHidden ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
    }

    const pw = document.getElementById('password');
    const confirmPw = document.getElementById('confirmPassword');
    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');

    const levels = [
        { re: /.{1,5}/, color: '#f87171', label: 'Weak' },
        { re: /.{6,7}/, color: '#fbbf24', label: 'Fair' },
        { re: /.{8,11}/, color: '#818cf8', label: 'Good' },
        { re: /.{12,}/, color: '#34d399', label: 'Strong' }
    ];

    pw.addEventListener('input', () => {
        const val = pw.value;
        if (!val) { bar.style.width = '0'; lbl.textContent = ''; return; }
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const lvl = levels[Math.min(score, 3)];
        bar.style.background = lvl.color;
        bar.style.width = ((score + 1) * 25) + '%';
        lbl.textContent = lvl.label;
        lbl.style.color = lvl.color;
    });

    confirmPw.addEventListener('input', () => {
        if (confirmPw.value && confirmPw.value !== pw.value) {
            confirmPw.classList.add('mismatch');
        } else {
            confirmPw.classList.remove('mismatch');
        }
    });
</script>
</body>
</html>
