<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify OTP — VaultHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --bg:#080810;--bg2:#0e0e1a;--bg3:#13131f;--border:#1e1e32;
            --accent:#6366f1;--accent2:#818cf8;--text:#e8e8f5;--muted:#52526e;
            --green:#34d399;--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.2rem;}
        .card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.2rem;}
        .icon-wrap{width:52px;height:52px;border-radius:14px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1.2rem;}
        h2{font-size:1.35rem;font-weight:800;color:#fff;margin-bottom:0.35rem;}
        .sub{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.8rem;}
        .email-tag{display:inline-block;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:var(--accent2);border-radius:6px;padding:2px 8px;font-family:var(--mono);font-size:0.78rem;margin-left:3px;}
        .field{margin-bottom:1.1rem;}
        .field label{display:block;font-size:0.76rem;font-weight:600;color:var(--text);margin-bottom:0.38rem;}
        .otp-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0.8rem 0.9rem;font-size:1.6rem;font-family:var(--mono);color:var(--text);outline:none;transition:all .2s;text-align:center;letter-spacing:10px;}
        .otp-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
        .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:0.72rem;font-size:0.9rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;box-shadow:0 2px 14px rgba(99,102,241,0.3);display:flex;align-items:center;justify-content:center;gap:0.4rem;}
        .btn-primary:hover{background:#5254cc;transform:translateY(-1px);}
        .alert-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:#fca5a5;border-radius:8px;padding:0.7rem 0.9rem;font-size:0.81rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;}
        .alert-ok{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);color:#6ee7b7;border-radius:8px;padding:0.7rem 0.9rem;font-size:0.81rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;}
        .step-bar{display:flex;gap:6px;margin-bottom:1.6rem;}
        .step{height:3px;flex:1;border-radius:4px;background:var(--border);}
        .step.active{background:var(--accent);}
        .resend-row{text-align:center;margin-top:1.1rem;}
        .resend-btn{background:none;border:none;color:var(--accent2);font-size:0.78rem;font-weight:600;cursor:pointer;font-family:var(--font);padding:0;}
        .resend-btn:hover{text-decoration:underline;}
        .timer{font-size:0.74rem;color:var(--muted);margin-top:0.4rem;}
        .back{display:inline-flex;align-items:center;gap:0.4rem;color:var(--muted);font-size:0.78rem;text-decoration:none;margin-top:1rem;}
        .back:hover{color:var(--accent2);}
    </style>
</head>
<body>
<div class="card">
    <div class="step-bar">
        <div class="step active"></div>
        <div class="step active"></div>
        <div class="step"></div>
    </div>
    <div class="icon-wrap">🔢</div>
    <h2>Enter verification code</h2>
    <p class="sub">
        We sent a 6-digit OTP to
        <span class="email-tag" th:text="${email}">h*****d@gmail.com</span><br/>
        It expires in <strong style="color:#e8e8f5;">10 minutes</strong>.
    </p>

    <div class="alert-err" th:if="${error}">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}">Error</span>
    </div>
    <div class="alert-ok" th:if="${success}">
        <i class="bi bi-check-circle"></i>
        <span th:text="${success}">Success</span>
    </div>

    <form th:action="@{/forgot-password/verify-otp}" method="post">
        <div class="field">
            <label>One-Time Password</label>
            <input class="otp-input" type="text" name="otp"
                   placeholder="000000" maxlength="6" inputmode="numeric"
                   pattern="[0-9]{6}" autocomplete="one-time-code" required autofocus/>
        </div>
        <button type="submit" class="btn-primary">
            <i class="bi bi-shield-check"></i> Verify OTP
        </button>
    </form>

    <div class="resend-row">
        <form th:action="@{/forgot-password/resend-otp}" method="post" style="display:inline;">
            <button type="submit" class="resend-btn">Didn't receive it? Resend OTP</button>
        </form>
    </div>

    <a href="/forgot-password" class="back"><i class="bi bi-arrow-left"></i> Use a different email</a>
</div>

<script>
    // Auto-format: only digits, max 6
    document.querySelector('.otp-input').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 6);
    });
</script>
</body>
</html>
